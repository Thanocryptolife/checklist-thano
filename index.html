<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHECKLIST_THANO - Trading Journal PRO</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <header class="pro-header">
        <div class="brand">
            <h1>CHECKLIST_<span class="cyan">THANO</span></h1>
            <div class="balance-box">
                <label>Capital :</label>
                <input type="number" id="capital-input" placeholder="Ex: 1000">
                <button onclick="initBalance()" class="btn-init">FIXER</button>
            </div>
        </div>
        <div class="stats-bar">
            <div class="stat">BALANCE: <span id="display-balance">0$</span></div>
            <div class="stat">WIN RATE: <span id="display-wr">0%</span></div>
            <div class="stat">P/L TOTAL: <span id="display-pl">0$</span></div>
        </div>
    </header>

    <div class="dashboard">
        <aside class="side-form card">
            <div id="edit-indicator" class="edit-mode-tag" style="display:none;">📝 MODE MODIFICATION ACTIF</div>
            <h2><span class="icon">⚙️</span> CONFIGURATION</h2>
            
            <div class="input-group">
                <label>Paire / Actif</label>
                <select id="asset-select">
                    <optgroup label="Forex Majors">
                        <option value="EURUSD">EUR/USD</option>
                        <option value="GBPUSD">GBP/USD</option>
                        <option value="USDJPY">USD/JPY</option>
                        <option value="XAUUSD">GOLD (XAU/USD)</option>
                    </optgroup>
                    <optgroup label="Indices & Crypto">
                        <option value="NAS100">NAS100</option>
                        <option value="US30">US30</option>
                        <option value="BTCUSD">BITCOIN</option>
                    </optgroup>
                </select>
            </div>

            <div class="flex-row">
                <div class="input-group">
                    <label>Direction</label>
                    <select id="trade-dir">
                        <option value="ACHAT">🟢 ACHAT</option>
                        <option value="VENTE">🔴 VENTE</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Risque %</label>
                    <input type="number" id="risk-pct" placeholder="1%">
                </div>
            </div>

            <div class="checklist">
                <h3>VÉRIFICATION (100%)</h3>
                <div class="check-grid">
                    <label><input type="checkbox" class="conf-cb" value="15" data-txt="Structure H4/H1"> Structure Fond (15%)</label>
                    <label><input type="checkbox" class="conf-cb" value="15" data-txt="Cassure Tendance"> Cassure Tendance (15%)</label>
                    <label><input type="checkbox" class="conf-cb" value="10" data-txt="SMMA/Zone"> SMMA / Zone (10%)</label>
                    <label><input type="checkbox" class="conf-cb" value="10" data-txt="News Eco"> Pas de News (10%)</label>
                    <label><input type="checkbox" class="conf-cb" value="10" data-txt="Ratio > 2.5"> Ratio RR > 2.5 (10%)</label>
                    <label><input type="checkbox" class="conf-cb" value="5" data-txt="Rebond 1"> Rebond 1 (5%)</label>
                    <label><input type="checkbox" class="conf-cb" value="5" data-txt="Rebond 2"> Rebond 2 (5%)</label>
                    <label><input type="checkbox" class="conf-cb" value="5" data-txt="Rebond 3"> Rebond 3 (5%)</label>
                    <label><input type="checkbox" class="conf-cb" value="10" data-txt="TF 1H"> Timeframe 1H (10%)</label>
                    <label><input type="checkbox" class="conf-cb" value="10" data-txt="TF 45m"> Timeframe 45m (10%)</label>
                    <label><input type="checkbox" class="conf-cb" value="5" data-txt="TF 30m"> Timeframe 30m (5%)</label>
                </div>
            </div>

            <div class="score-container">
                <div id="score-val">0%</div>
                <div class="bar-bg"><div id="bar-fill"></div></div>
            </div>
        </aside>

        <main class="main-view">
            <section class="card chart-box">
                <h2><span class="icon">🖼️</span> ANALYSE GRAPHIQUE</h2>
                <div class="image-display" id="img-container">
                    <img id="view-img" src="" style="display:none;">
                    <span id="no-img-text">Aperçu du graphique</span>
                </div>
                <input type="text" id="img-url" placeholder="Coller l'URL TradingView ici...">
            </section>

            <section class="card result-box">
                <div class="flex-row">
                    <div class="input-group">
                        <label>Statut</label>
                        <select id="trade-status">
                            <option value="EN_COURS">⏳ EN COURS</option>
                            <option value="WIN">✅ GAGNANT</option>
                            <option value="LOSS">❌ PERDANT</option>
                            <option value="BE">🛡️ BREAK-EVEN</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>P/L ($)</label>
                        <input type="number" id="trade-pl" placeholder="Ex: 250">
                    </div>
                </div>
                <textarea id="trade-notes" placeholder="Notes de session..."></textarea>
                <div class="flex-row">
                    <button id="save-btn" class="btn-primary">ENREGISTRER LA POSITION</button>
                    <button id="cancel-btn" class="btn-secondary" style="display:none;">ANNULER</button>
                </div>
            </section>
        </main>
    </div>

    <section class="card analytics-section">
        <h2><span class="icon">📈</span> ANALYSE DE PERFORMANCE (DATA)</h2>
        <div id="monthly-stats-container" class="stats-grid-pro"></div>
    </section>

    <section class="card history-section">
        <div class="header-flex" style="display:flex; justify-content:space-between; align-items:center;">
            <h2><span class="icon">📜</span> JOURNAL COMPLET</h2>
            <div class="backup-btns">
                <button onclick="exportData()" class="btn-small">💾 SAUVEGARDER DATA</button>
            </div>
        </div>
        <div class="table-scroll">
            <table id="trade-table">
                <thead>
                    <tr>
                        <th>Date</th><th>Paire</th><th>Type</th><th>Score</th><th>Statut</th><th>P/L ($)</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </section>
</div>

<script src="script.js"></script>
</body>
</html>
